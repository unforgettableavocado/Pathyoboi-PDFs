name: Clean PDF and Release

on:
  workflow_dispatch:
    inputs:
      gdrive_id:
        description: 'Google Drive File ID (যেমন: 1A2B3C4D...)'
        required: true
        type: string
      output_name:
        description: 'নতুন পিডিএফের নাম (যেমন: Physics_1st_Paper.pdf)'
        required: true
        default: 'Cleaned_Book.pdf'
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install PyMuPDF gdown

      - name: Download PDF from Google Drive
        run: |
          # এখানে --id বাদ দেওয়া হয়েছে, সরাসরি আইডি ইনপুট নেবে
          gdown "${{ github.event.inputs.gdrive_id }}" -O input.pdf

      - name: Process PDF (Remove Watermark)
        run: |
          python clean_pdf.py

      - name: Rename Output File
        run: |
          mv cleaned_book.pdf "${{ github.event.inputs.output_name }}"

      - name: Create Release and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d-%H%M%S')"
          
          gh release create "$TAG_NAME" "${{ github.event.inputs.output_name }}" \
            --title "PDF Release - ${{ github.event.inputs.output_name }}" \
            --notes "Automated Watermark and Password Removal."
